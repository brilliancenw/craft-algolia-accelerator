<svg width="100%" viewBox="0 0 680 380" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Speedometer with needle pegged high</title>
  <desc>Clean semicircular speedometer, needle at about 90 percent with green, yellow, and red zones.</desc>

  <g transform="translate(340, 240)">

    <!-- Green zone: lower-left up through 9 o'clock to upper-left -->
    <path fill="none" stroke="#4caf50" stroke-width="18" stroke-linecap="round"
      d="M -59 102.2 A 118 118 0 0 1 -59 -102.2"/>

    <!-- Yellow zone: upper-left through 12 o'clock to upper-right -->
    <path fill="none" stroke="#ffc107" stroke-width="18"
      d="M -59 -102.2 A 118 118 0 0 1 102.2 -59"/>

    <!-- Red zone: upper-right down to lower-right -->
    <path fill="none" stroke="#e53935" stroke-width="18" stroke-linecap="round"
      d="M 102.2 -59 A 118 118 0 0 1 59 102.2"/>

    <!-- Needle pointing at ~90% of arc -->
    <g transform="rotate(120)">
      <polygon fill="#222222"
        points="0,-108 -4.5,0 0,14 4.5,0"/>
    </g>

    <!-- Hub -->
    <circle fill="#222222" r="11"/>
    <circle fill="#ffffff" r="5.5"/>

  </g>
</svg>
